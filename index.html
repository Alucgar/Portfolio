	<style type="text/css">
		img.titulo1{
			width: 60px;
		}
		.colorheader{
			height: auto;

		}
		i.desplegable{

		}
		i.instagram,  i.facebook, i.twiter, i.pinterest{
			color: #CD8175;

		}
		.gallery img {

        }
        .gallery img:hover {
            transform: scale(1.1); /*zoom */
        }
        .gallery-item {
            margin-bottom: 15px;
        }
		@media screen and (min-width:576px){
			img.titulo1{

		    }
		    i.desplegable{

			i.instagram,  i.facebook, i.twiter, i.pinterest{
